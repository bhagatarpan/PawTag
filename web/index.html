<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pawtag">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>pawtag</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBh1jTuquS7IyWIKhF-PRmMZXhkjOm9siA&callback=initMap">
    </script>


  <!-- <script src="https://maps.googleapis.com/maps/api/js?key="></script> -->
  <script>
    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 8,
        center: { lat: -34.397, lng: 150.644 },
      });

      // Create a custom marker using AdvancedMarkerElement
      const advancedMarker = new google.maps.marker.AdvancedMarkerElement();
      advancedMarker.map = map;
      advancedMarker.position = { lat: -34.397, lng: 150.644 };
      advancedMarker.title = "Custom Marker";

      // Add any additional properties or event listeners you need
      advancedMarker.addEventListener('click', () => {
        alert("Marker clicked!");
      });

      const customIcon = {
        url: "path/to/your/icon.png",
        scaledSize: new google.maps.Size(25, 25),
        origin: new google.maps.Point(0, 0),
        anchor: new google.maps.Point(12.5, 12.5)
      };

      advancedMarker.content = `
        <img src="${customIcon.url}" width="${customIcon.scaledSize.width}" height="${customIcon.scaledSize.height}">
        <div style="position: absolute; bottom: 0; left: 0; right: 0;">
          ${advancedMarker.title}
        </div>
      `;
    }
  </script>
</head>

<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
