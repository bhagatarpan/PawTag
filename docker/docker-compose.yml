services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: admin
        PORT: "3001"
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: web
        PORT: "3000"
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  customer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: customer
        PORT: "3002"
    ports:
      - "3002:80"
    depends_on:
      - api
    restart: unless-stopped

  finder:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: finder
        PORT: "3003"
    ports:
      - "3003:80"
    depends_on:
      - api
    restart: unless-stopped
